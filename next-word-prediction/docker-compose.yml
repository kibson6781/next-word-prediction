version: "3.9"

services:
  backend:
    build: ./backend
    container_name: nwp-backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend/models:/app/models
    environment:
      - FLASK_ENV=production
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nwp-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
